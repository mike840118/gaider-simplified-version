name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 這裡確保對應您的分支名稱

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vue 打包後的預設目錄